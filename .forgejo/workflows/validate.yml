name: Validate Renovate presets

# Forgejo mirror of the former .github/workflows/validate.yml (runs-on: docker, checkout@v5).

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.preset }})
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        preset:
          - default.json
          - grouped.json
          - safe-automerge.json
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Validate ${{ matrix.preset }}
        run: npm run validate:preset -- ${{ matrix.preset }}

  validate-all:
    name: validate all presets
    runs-on: docker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Validate full preset suite
        run: npm run validate
