name: Validate Renovate presets

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.preset }})
    runs-on: arc-runner-set
    strategy:
      fail-fast: false
      matrix:
        preset:
          - default.json
          - grouped.json
          - safe-automerge.json
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Validate ${{ matrix.preset }}
        run: npx --yes --package renovate@43.206.1 renovate-config-validator --strict ${{ matrix.preset }}

  validate-all:
    name: validate all presets
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Validate full preset suite
        run: npm run validate
