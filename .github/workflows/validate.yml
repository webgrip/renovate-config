name: Validate Renovate presets

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.preset }})
    runs-on: arc-runner-set
    strategy:
      fail-fast: false
      matrix:
        preset:
          - default.json
          - grouped.json
          - safe-automerge.json
          - gitops.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Validate ${{ matrix.preset }}
        run: npx --yes --package renovate renovate-config-validator --strict ${{ matrix.preset }}
