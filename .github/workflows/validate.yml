name: Validate Renovate presets

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.preset }})
    runs-on: arc-runner-set
    strategy:
      fail-fast: false
      matrix:
        preset:
          - default.json
          - grouped.json
          - safe-automerge.json
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Validate ${{ matrix.preset }}
        run: npm run validate:preset -- ${{ matrix.preset }}

  validate-all:
    name: validate all presets
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Validate full preset suite
        run: npm run validate
