name: Release

on:
  push:
    branches:
      - main
      - beta
      - alpha

concurrency:
  # Only one release job at a time per branch — never cancel an in-flight release.
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # create tags, push changelog commit, create GitHub Release
  issues: write          # comment on issues when a fix ships
  pull-requests: write   # comment on PRs when a change ships
  id-token: write        # required for OIDC token (future provenance signing)

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release needs full history to determine the next version
          fetch-depth: 0
          # use our own token so the tag/commit created here can trigger
          # downstream workflows (GITHUB_TOKEN events don't re-trigger Actions)
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Re-validate all presets right before cutting a release.
      # @semantic-release/exec also runs this in verifyRelease, but an
      # explicit step gives a clear failure signal in the Actions UI.
      - name: Validate presets
        run: npm run validate

      - name: Release
        env:
          # RELEASE_TOKEN must be a fine-grained PAT with:
          #   - Contents: read & write
          #   - Issues: read & write
          #   - Pull requests: read & write
          #   - Bypass branch protection on main (so the changelog commit lands directly)
          # Fall back to GITHUB_TOKEN for repos without strict branch protection.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: "webgrip-bot"
          GIT_AUTHOR_EMAIL: "bot@webgrip.nl"
          GIT_COMMITTER_NAME: "webgrip-bot"
          GIT_COMMITTER_EMAIL: "bot@webgrip.nl"
        run: npx semantic-release
