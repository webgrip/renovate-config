name: On Source Change

on:
  push:
    branches:
      - main
      - next
    paths:
      - default.json
      - grouped.json
      - safe-automerge.json
      - gitops.json
      - .releaserc.json
      - package.json
      - package-lock.json
      - .nvmrc

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate (${{ matrix.preset }})
    runs-on: arc-runner-set
    strategy:
      fail-fast: false
      matrix:
        preset:
          - default.json
          - grouped.json
          - safe-automerge.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Validate ${{ matrix.preset }}
        run: npx --yes --package renovate@43.208.0 renovate-config-validator --strict ${{ matrix.preset }}

  validate-all:
    name: validate all presets
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Validate full preset suite
        run: npm run validate

  release:
    name: Semantic Release
    needs:
      - validate
      - validate-all
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      statuses: write
      id-token: write
    uses: webgrip/workflows/.github/workflows/semantic-release.yml@main
    with:
      use-bot-to-commit: true
    secrets:
      WEBGRIP_CI_APP_ID: ${{ secrets.WEBGRIP_CI_APP_ID }}
      WEBGRIP_CI_APP_PRIVATE_KEY: ${{ secrets.WEBGRIP_CI_APP_PRIVATE_KEY }}
